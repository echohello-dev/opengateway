name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@5b8b3a9b7e6c7e4d3a2f1c0b9a8e7d6c5b4a3f2e # v4.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: python
          package-name: opengateway
          changelog-path: CHANGELOG.md
          bump-minor-pre-major: true
          bump-patch-for-minor-pre-major: false
          default-branch: main
          include-component-in-tag: false

      - name: Publish to PyPI (on release)
        if: steps.release.outputs.release_created == 'true'
        uses: pypa/gh-action-pypi-publish@67339c736fd9354cd4f8cb0b744f2b82a74b5c20 # v1.12.4
        with:
          packages-dir: dist/
          skip-existing: true
