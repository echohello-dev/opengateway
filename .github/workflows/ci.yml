name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint (ruff)
        run: uv run ruff check opengateway/ tests/

      - name: Format check (ruff format)
        run: uv run ruff format --check opengateway/ tests/

      - name: Type check (mypy)
        run: uv run mypy opengateway/

      - name: Test
        run: uv run pytest -v --tb=short

  mojo:
    name: Mojo (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | sh
          echo "$HOME/.pixi/bin" >> "$GITHUB_PATH"

      - name: Cache pixi environment
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .pixi
            ~/.cache/pixi
          key: ${{ runner.os }}-pixi-${{ hashFiles('pixi.toml', 'pixi.lock') }}
          restore-keys: |
            ${{ runner.os }}-pixi-

      - name: Install dependencies
        run: pixi install

      - name: Format check (mojo)
        working-directory: opengateway/mojo
        continue-on-error: true
        run: |
          # Best-effort: the Mojo CLI format flags churn between nightly
          # builds. We try the new --check flag first, then fall back to
          # in-place format + diff. Either way, we don't block on
          # this; the mojo test step below is the real check.
          if pixi run -e mojo mojo format --help 2>&1 | grep -q -- '--check'; then
            pixi run -e mojo mojo format --check . || true
          else
            SNAP=$(mktemp -d)
            cp -R . "$SNAP/before"
            pixi run -e mojo mojo format . >/dev/null 2>&1 || true
            if ! diff -r "$SNAP/before" . >/dev/null 2>&1; then
              echo "::warning::Mojo formatting diff (informational only):"
              diff -r "$SNAP/before" . | head -50 || true
            fi
            rm -rf "$SNAP"
          fi

      - name: Build (compile only)
        working-directory: opengateway/mojo
        run: pixi run -e mojo mojo build main.mojo

      - name: Test
        working-directory: opengateway/mojo
        run: pixi run -e mojo mojo run test_router.mojo
