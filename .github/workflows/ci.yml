name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint (ruff)
        run: uv run ruff check opengateway/ tests/

      - name: Format check (ruff format)
        run: uv run ruff format --check opengateway/ tests/

      - name: Type check (mypy)
        run: uv run mypy opengateway/

      - name: Test
        run: uv run pytest -v --tb=short

  mojo:
    name: Mojo (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | sh
          echo "$HOME/.pixi/bin" >> "$GITHUB_PATH"

      - name: Cache pixi environment
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .pixi
            ~/.cache/pixi
          key: ${{ runner.os }}-pixi-${{ hashFiles('pixi.toml', 'pixi.lock') }}
          restore-keys: |
            ${{ runner.os }}-pixi-

      - name: Install dependencies
        run: pixi install

      - name: Format check (mojo)
        working-directory: opengateway/mojo
        run: |
          # Format check works three ways depending on the Mojo CLI build:
          # 1. Newer: `mojo format --check <path>` exits 0/1 with no writes
          # 2. Older with -o: `mojo format -o <dir> <path>` writes elsewhere
          # 3. Oldest: `mojo format <path>` writes in place
          # Strategy: snapshot files, run formatter, diff, restore.
          set -e
          if pixi run -e mojo mojo format --help 2>&1 | grep -q -- '--check'; then
            pixi run -e mojo mojo format --check .
          else
            SNAP=$(mktemp -d)
            cp -R . "$SNAP/before"
            if pixi run -e mojo mojo format --help 2>&1 | grep -q -- -- '-o'; then
              OUT=$(mktemp -d)
              pixi run -e mojo mojo format -o "$OUT" .
              if ! diff -r "$SNAP/before" "$OUT" >/dev/null 2>&1; then
                echo "Mojo formatting diff:"
                diff -r "$SNAP/before" "$OUT" || true
                cp -R "$OUT"/. .
                exit 1
              fi
            else
              pixi run -e mojo mojo format .
              if ! diff -r "$SNAP/before" . >/dev/null 2>&1; then
                echo "Mojo formatting diff (writing fix back to working dir):"
                diff -r "$SNAP/before" . || true
                exit 1
              fi
            fi
            rm -rf "$SNAP"
          fi

      - name: Build (compile only)
        working-directory: opengateway/mojo
        run: pixi run -e mojo mojo build main.mojo

      - name: Test
        working-directory: opengateway/mojo
        run: pixi run -e mojo mojo run test_router.mojo
